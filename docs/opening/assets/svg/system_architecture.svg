<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .title { font: 700 34px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #18375c; }
      .label { font: 700 23px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #1f2933; }
      .small { font: 400 18px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #52606d; }
      .focus { font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #b22626; }
      .box { fill: #f6f8fa; stroke: #18375c; stroke-width: 2.4; rx: 10; }
      .redbox { fill: #faebeb; stroke: #b22626; stroke-width: 2.4; rx: 10; }
      .line { stroke: #667080; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .feedback { stroke: #b22626; stroke-width: 3.2; fill: none; marker-end: url(#arrow-red); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#667080"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b22626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#ffffff"/>
  <text class="title" x="640" y="64" text-anchor="middle">SQL+ 多智能体反馈修正框架</text>

  <rect class="box" x="72" y="138" width="190" height="86"/>
  <text class="label" x="167" y="173" text-anchor="middle">用户问题</text>
  <text class="small" x="167" y="203" text-anchor="middle">Natural language</text>

  <rect class="box" x="342" y="138" width="210" height="86"/>
  <text class="label" x="447" y="173" text-anchor="middle">SQL+ Generator</text>
  <text class="small" x="447" y="203" text-anchor="middle">question + schema</text>

  <rect class="box" x="632" y="138" width="190" height="86"/>
  <text class="label" x="727" y="173" text-anchor="middle">Translator</text>
  <text class="small" x="727" y="203" text-anchor="middle">SQL+ -> SQL</text>

  <rect class="box" x="902" y="138" width="190" height="86"/>
  <text class="label" x="997" y="173" text-anchor="middle">Executor</text>
  <text class="small" x="997" y="203" text-anchor="middle">result / error</text>

  <path class="line" d="M262 181 H334"/>
  <path class="line" d="M552 181 H624"/>
  <path class="line" d="M822 181 H894"/>

  <path class="feedback" d="M997 224 V308 C997 330 972 338 940 338 H345"/>
  <text class="focus" x="765" y="315" text-anchor="middle">执行反馈进入诊断与修复闭环</text>

  <rect class="redbox" x="132" y="390" width="220" height="96"/>
  <text class="label" x="242" y="428" text-anchor="middle">Critic Agent</text>
  <text class="small" x="242" y="458" text-anchor="middle">错误类型与步骤定位</text>

  <rect class="redbox" x="432" y="390" width="220" height="96"/>
  <text class="label" x="542" y="428" text-anchor="middle">Skill Router</text>
  <text class="small" x="542" y="458" text-anchor="middle">选择局部 repair skill</text>

  <rect class="redbox" x="732" y="390" width="220" height="96"/>
  <text class="label" x="842" y="428" text-anchor="middle">Repair Skill</text>
  <text class="small" x="842" y="458" text-anchor="middle">生成 SQL+ patch</text>

  <rect class="redbox" x="1032" y="390" width="176" height="96"/>
  <text class="label" x="1120" y="428" text-anchor="middle">Executor</text>
  <text class="small" x="1120" y="458" text-anchor="middle">验证候选</text>

  <path class="line" d="M352 438 H424"/>
  <path class="line" d="M652 438 H724"/>
  <path class="line" d="M952 438 H1024"/>
  <path class="feedback" d="M1120 390 V296 C1120 272 1096 258 1052 258 H457 C432 258 417 245 417 224"/>

  <rect x="186" y="584" width="908" height="56" fill="#faebeb" stroke="#b22626" stroke-width="2" rx="8"/>
  <text class="focus" x="640" y="620" text-anchor="middle">核心：不整条重写 SQL，把错误压回 SQL+ 的局部步骤中修</text>
</svg>
