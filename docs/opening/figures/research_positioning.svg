<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<defs>
<marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#1F4E79" />
</marker>
<marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#C65911" />
</marker>
<style><![CDATA[
text { font-family: 'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif; }
.title { font-size: 34px; font-weight: 700; fill: #1F4E79; }
.subtitle { font-size: 20px; fill: #666666; }
.box-title { font-size: 20px; font-weight: 700; fill: #2B2B2B; }
.box-text { font-size: 17px; fill: #2B2B2B; }
.small { font-size: 15px; fill: #2B2B2B; }
.note { font-size: 17px; fill: #C65911; }
]]></style>
</defs>
<rect x="0" y="0" width="1200" height="720" fill="#FFFFFF"/>
<text x="60" y="60" text-anchor="start" class="title">研究定位：SQL+ 与已有中间表示的区别</text>
<text x="575" y="650" text-anchor="middle" class="subtitle">越接近 SQL 生态与执行链路</text>
<text x="48" y="360" text-anchor="start" class="subtitle">越强调语义抽象</text>
<line x1="160" y1="610" x2="1020" y2="610" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<line x1="160" y1="610" x2="160" y2="120" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="300" y="470" width="220" height="110" rx="16" fill="#DDEBF7" stroke="#1F4E79" stroke-width="2"/>
<text x="410" y="499" text-anchor="middle" class="box-text">
<tspan x="410" dy="0">NatSQL</tspan>
<tspan x="410" dy="24">更自然语言化</tspan>
<tspan x="410" dy="24">降低部分 SQL 书写复杂度</tspan>
</text>
<rect x="360" y="250" width="220" height="110" rx="16" fill="#E2EFDA" stroke="#548235" stroke-width="2"/>
<text x="470" y="279" text-anchor="middle" class="box-text">
<tspan x="470" dy="0">SemQL</tspan>
<tspan x="470" dy="24">语义解析树</tspan>
<tspan x="470" dy="24">结构约束更强</tspan>
</text>
<rect x="720" y="470" width="220" height="110" rx="16" fill="#FBE5D6" stroke="#C65911" stroke-width="2"/>
<text x="830" y="499" text-anchor="middle" class="box-text">
<tspan x="830" dy="0">Pipe-style</tspan>
<tspan x="830" dy="24">线性数据流</tspan>
<tspan x="830" dy="24">贴近 SQL 扩展</tspan>
</text>
<rect x="790" y="260" width="220" height="110" rx="16" fill="#FFF2CC" stroke="#C65911" stroke-width="2"/>
<text x="900" y="289" text-anchor="middle" class="box-text">
<tspan x="900" dy="0">SQL+</tspan>
<tspan x="900" dy="24">NL2SQL 中间表示</tspan>
<tspan x="900" dy="24">可转换、可定位、可修复</tspan>
</text>
<text x="60" y="685" text-anchor="start" class="note">SQL+ 的定位不是替代 SemQL 或 NatSQL，而是面向执行反馈和局部修复重新设计中间表示。</text>
</svg>
