<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<defs>
<marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#1F4E79" />
</marker>
<marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#C65911" />
</marker>
<style><![CDATA[
text { font-family: 'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif; }
.title { font-size: 34px; font-weight: 700; fill: #1F4E79; }
.subtitle { font-size: 20px; fill: #666666; }
.box-title { font-size: 20px; font-weight: 700; fill: #2B2B2B; }
.box-text { font-size: 17px; fill: #2B2B2B; }
.small { font-size: 15px; fill: #2B2B2B; }
.note { font-size: 17px; fill: #C65911; }
]]></style>
</defs>
<rect x="0" y="0" width="1200" height="720" fill="#FFFFFF"/>
<text x="60" y="60" text-anchor="start" class="title">Critic Agent 与 Skill Router 的修复流程</text>
<rect x="90" y="135" width="210" height="82" rx="16" fill="#DDEBF7" stroke="#1F4E79" stroke-width="2"/>
<text x="195" y="163" text-anchor="middle" class="box-text">
<tspan x="195" dy="0">执行反馈</tspan>
<tspan x="195" dy="24">错误信息 / 异常结果</tspan>
</text>
<line x1="305" y1="176" x2="375" y2="176" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="390" y="135" width="210" height="82" rx="16" fill="#E2EFDA" stroke="#548235" stroke-width="2"/>
<text x="495" y="163" text-anchor="middle" class="box-text">
<tspan x="495" dy="0">Critic Agent</tspan>
<tspan x="495" dy="24">错误类型 + 可疑步骤</tspan>
</text>
<line x1="605" y1="176" x2="675" y2="176" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="690" y="135" width="210" height="82" rx="16" fill="#FBE5D6" stroke="#C65911" stroke-width="2"/>
<text x="795" y="163" text-anchor="middle" class="box-text">
<tspan x="795" dy="0">Skill Router</tspan>
<tspan x="795" dy="24">路由到局部技能</tspan>
</text>
<rect x="80" y="335" width="185" height="86" rx="16" fill="#FFFFFF" stroke="#C65911" stroke-width="2"/>
<text x="172" y="365" text-anchor="middle" class="small">
<tspan x="172" dy="0">value-linking</tspan>
<tspan x="172" dy="24">WHERE 值和过滤条件</tspan>
</text>
<line x1="795" y1="225" x2="172" y2="330" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<rect x="300" y="335" width="185" height="86" rx="16" fill="#FFFFFF" stroke="#C65911" stroke-width="2"/>
<text x="392" y="365" text-anchor="middle" class="small">
<tspan x="392" dy="0">order</tspan>
<tspan x="392" dy="24">ORDER / LIMIT</tspan>
</text>
<line x1="795" y1="225" x2="392" y2="330" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<rect x="520" y="335" width="185" height="86" rx="16" fill="#FFFFFF" stroke="#C65911" stroke-width="2"/>
<text x="612" y="365" text-anchor="middle" class="small">
<tspan x="612" dy="0">aggregation</tspan>
<tspan x="612" dy="24">GROUP / AGG / HAVING</tspan>
</text>
<line x1="795" y1="225" x2="612" y2="330" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<rect x="740" y="335" width="185" height="86" rx="16" fill="#FFFFFF" stroke="#C65911" stroke-width="2"/>
<text x="832" y="365" text-anchor="middle" class="small">
<tspan x="832" dy="0">join</tspan>
<tspan x="832" dy="24">JOIN path</tspan>
</text>
<line x1="795" y1="225" x2="832" y2="330" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<rect x="960" y="335" width="185" height="86" rx="16" fill="#FFFFFF" stroke="#C65911" stroke-width="2"/>
<text x="1052" y="365" text-anchor="middle" class="small">
<tspan x="1052" dy="0">projection</tspan>
<tspan x="1052" dy="24">SELECT 输出列</tspan>
</text>
<line x1="795" y1="225" x2="1052" y2="330" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<rect x="390" y="535" width="420" height="78" rx="16" fill="#E2EFDA" stroke="#548235" stroke-width="2"/>
<text x="600" y="561" text-anchor="middle" class="box-text">
<tspan x="600" dy="0">Executor 重新验证</tspan>
<tspan x="600" dy="24">SQL+ patch → SQL → 执行结果</tspan>
</text>
<line x1="172" y1="425" x2="565" y2="530" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<line x1="392" y1="425" x2="565" y2="530" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<line x1="612" y1="425" x2="565" y2="530" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<line x1="832" y1="425" x2="565" y2="530" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<line x1="1052" y1="425" x2="565" y2="530" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<text x="60" y="670" text-anchor="start" class="note">对比整条 SQL 重写：该流程把修改限制在可疑步骤，便于控制 patch 范围。</text>
</svg>
