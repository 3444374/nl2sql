<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<defs>
<marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#1F4E79" />
</marker>
<marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#C65911" />
</marker>
<style><![CDATA[
text { font-family: 'Microsoft YaHei', 'Noto Sans CJK SC', Arial, sans-serif; }
.title { font-size: 34px; font-weight: 700; fill: #1F4E79; }
.subtitle { font-size: 20px; fill: #666666; }
.box-title { font-size: 20px; font-weight: 700; fill: #2B2B2B; }
.box-text { font-size: 17px; fill: #2B2B2B; }
.small { font-size: 15px; fill: #2B2B2B; }
.note { font-size: 17px; fill: #C65911; }
]]></style>
</defs>
<rect x="0" y="0" width="1200" height="720" fill="#FFFFFF"/>
<text x="60" y="60" text-anchor="start" class="title">SQL+ 多智能体生成与反馈修正闭环</text>
<rect x="70" y="125" width="210" height="90" rx="16" fill="#DDEBF7" stroke="#1F4E79" stroke-width="2"/>
<text x="175" y="157" text-anchor="middle" class="box-text">
<tspan x="175" dy="0">Intent Agent</tspan>
<tspan x="175" dy="24">识别查询目标</tspan>
</text>
<line x1="288" y1="170" x2="330" y2="170" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="340" y="125" width="210" height="90" rx="16" fill="#DDEBF7" stroke="#1F4E79" stroke-width="2"/>
<text x="445" y="157" text-anchor="middle" class="box-text">
<tspan x="445" dy="0">Schema Agent</tspan>
<tspan x="445" dy="24">表字段与关系</tspan>
</text>
<line x1="558" y1="170" x2="600" y2="170" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="610" y="125" width="210" height="90" rx="16" fill="#DDEBF7" stroke="#1F4E79" stroke-width="2"/>
<text x="715" y="157" text-anchor="middle" class="box-text">
<tspan x="715" dy="0">Planner Agent</tspan>
<tspan x="715" dy="24">SQL+ 步骤计划</tspan>
</text>
<line x1="828" y1="170" x2="870" y2="170" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="880" y="125" width="210" height="90" rx="16" fill="#DDEBF7" stroke="#1F4E79" stroke-width="2"/>
<text x="985" y="157" text-anchor="middle" class="box-text">
<tspan x="985" dy="0">SQL+ Generator</tspan>
<tspan x="985" dy="24">生成中间表示</tspan>
</text>
<rect x="70" y="305" width="210" height="90" rx="16" fill="#E2EFDA" stroke="#548235" stroke-width="2"/>
<text x="175" y="337" text-anchor="middle" class="box-text">
<tspan x="175" dy="0">Translator</tspan>
<tspan x="175" dy="24">SQL+ 转 SQL</tspan>
</text>
<line x1="288" y1="350" x2="330" y2="350" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="340" y="305" width="210" height="90" rx="16" fill="#E2EFDA" stroke="#548235" stroke-width="2"/>
<text x="445" y="337" text-anchor="middle" class="box-text">
<tspan x="445" dy="0">Executor</tspan>
<tspan x="445" dy="24">执行并返回反馈</tspan>
</text>
<line x1="558" y1="350" x2="600" y2="350" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="610" y="305" width="210" height="90" rx="16" fill="#E2EFDA" stroke="#548235" stroke-width="2"/>
<text x="715" y="337" text-anchor="middle" class="box-text">
<tspan x="715" dy="0">Critic Agent</tspan>
<tspan x="715" dy="24">定位错误步骤</tspan>
</text>
<line x1="828" y1="350" x2="870" y2="350" stroke="#1F4E79" stroke-width="3" marker-end="url(#arrow-blue)"/>
<rect x="880" y="305" width="210" height="90" rx="16" fill="#E2EFDA" stroke="#548235" stroke-width="2"/>
<text x="985" y="337" text-anchor="middle" class="box-text">
<tspan x="985" dy="0">Skill Router</tspan>
<tspan x="985" dy="24">选择修复技能</tspan>
</text>
<line x1="1015" y1="220" x2="1015" y2="295" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<rect x="280" y="500" width="250" height="90" rx="16" fill="#FBE5D6" stroke="#C65911" stroke-width="2"/>
<text x="405" y="532" text-anchor="middle" class="box-text">
<tspan x="405" dy="0">Repair Skill</tspan>
<tspan x="405" dy="24">局部 SQL+ patch</tspan>
</text>
<rect x="680" y="500" width="250" height="90" rx="16" fill="#FBE5D6" stroke="#C65911" stroke-width="2"/>
<text x="805" y="532" text-anchor="middle" class="box-text">
<tspan x="805" dy="0">重新验证</tspan>
<tspan x="805" dy="24">SQL+ → SQL → 执行</tspan>
</text>
<line x1="530" y1="545" x2="670" y2="545" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<line x1="805" y1="500" x2="805" y2="405" stroke="#C65911" stroke-width="3" marker-end="url(#arrow-orange)"/>
<text x="60" y="660" text-anchor="start" class="note">设计意图：每个 Agent 输出可检查中间产物，避免把多智能体退化成多个 prompt 的简单串联。</text>
</svg>
